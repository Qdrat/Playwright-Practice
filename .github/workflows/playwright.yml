name: Playwright Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    schedule:
        # Запуск каждый день в полночь. ВНИМАНИЕ: время в cron указывается по UTC!
        # Примечание: GitHub не гарантирует запуск минута в минуту и может стартовать с задержкой.
        - cron: '0 0 * * *'
# Даем права пайплайну на запись, чтобы он мог публиковать сайт
permissions:
    contents: write

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            matrix:
                browser: [chromium, firefox, webkit, pixel5]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            - name: Run Playwright tests
              run: npx playwright test --project=${{ matrix.browser }}

            - name: Upload Playwright Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-${{ matrix.browser }}
                  path: playwright-report
                  retention-days: 10

            # Генерируем Allure отчет стабильной версией экшена
            - name: Generate Allure Report
              uses: simple-elf/allure-report-action@v1.9
              if: always()
              with:
                  allure_results: allure-results
                  allure_history: allure-history

            # Публикуем статичный сайт на GitHub Pages
            - name: Deploy Allure to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              if: always()
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: allure-history
