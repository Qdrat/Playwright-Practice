name: Playwright Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    schedule:
        # Запуск каждый день в полночь. ВНИМАНИЕ: время в cron указывается по UTC!
        # Примечание: GitHub не гарантирует запуск минута в минуту и может стартовать с задержкой.
        - cron: '0 0 * * *'
# Даем права пайплайну на запись, чтобы он мог публиковать сайт
permissions:
    contents: write

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
          matrix:
            browser: [chromium, firefox, webkit, pixel5]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps ${{ matrix.browser }}

            - name: Run Playwright tests
              run: npx playwright test --project=${{ matrix.browser }}

            - name: Upload Playwright Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-${{ matrix.browser }}
                  path: playwright-report
                  retention-days: 10

            - run: npm install -g allure-commandline

            - run: allure generate allure-results --clean -o allure-report

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: allure-report
                  path: allure-report

    deploy-report:
        needs: test
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: allure-report
                  path: allure-report

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./allure-report
                  publish_branch: gh-pages
                  keep_files: true
                  force_orphan: true
